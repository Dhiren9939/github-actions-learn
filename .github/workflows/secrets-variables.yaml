name: Secrets and Variables

on:
    workflow_dispatch:

jobs:
    prod:
        environment: prod
        runs-on: ubuntu-24.04
        steps:
            - run: |
                  echo "REPO_SECRET: ${{secrets.REPO_SECRET}}"
                  echo "REPO_VAR: ${{vars.REPO_VAR}}"
                  echo "ENVIRONMENT_SECRET: ${{secrets.SECRET}}"
                  echo "ENVIRONMENT_VAR: ${{vars.VAR}}"
