name: Persisting Artifacts

on:
    workflow_dispatch:
    
jobs:
    create-artifact:
        runs-on: ubuntu-24.04
        steps:
            - run: echo "$(date)" >> "data.txt"
            - uses: actions/upload-artifact@v7
              with: 
                name: data
                path: data.txt
    
    pull-artifact:
        needs: create-artifact
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/download-artifact@v8
              with:
                name: data
            - run: cat data.txt